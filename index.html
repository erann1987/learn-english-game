<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn English — Vocabulary Flashcards</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>📚 Learn English</h1>
    <p class="subtitle">Vocabulary Flashcards</p>
  </header>

  <main>
    <section id="category-selector">
      <h2>Choose a Category</h2>
      <div id="category-buttons" class="category-grid"></div>
    </section>

    <section id="flashcard-area" class="hidden">
      <div class="flashcard-header">
        <button id="back-btn" class="btn btn-secondary">← Categories</button>
        <span id="progress-label" class="progress-label"></span>
      </div>

      <div id="flashcard" class="flashcard" tabindex="0">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <span id="word-text" class="word-text"></span>
          </div>
          <div class="flashcard-back">
            <span id="translation-text" class="translation-text"></span>
            <p id="example-text" class="example-text"></p>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="prev-btn" class="btn">← Previous</button>
        <button id="flip-btn" class="btn btn-primary">Flip</button>
        <button id="next-btn" class="btn">Next →</button>
      </div>

      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </section>
  </main>

  <script src="data/vocabulary.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
